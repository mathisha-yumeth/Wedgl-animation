<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGL 3D Animation</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  canvas { display: block; }
  #info {
    position: absolute;
    top: 16px;
    left: 16px;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    pointer-events: none;
    user-select: none;
  }
  #footer {
    position: absolute;
    bottom: 12px;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div id="info">Drag to rotate &middot; Scroll to zoom</div>
<div id="footer">&copy; 2026 Your Name — MIT License</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/*
 * WebGL 3D Animation
 * Copyright (c) 2026 Your Name
 * Released under the MIT License
 *
 * Permission is hereby granted, free of charge, to any person obtaining a copy
 * of this software and associated documentation files, to deal in the Software
 * without restriction, including without limitation the rights to use, copy,
 * modify, merge, publish, distribute, sublicense, and/or sell copies of the
 * Software, subject to inclusion of this copyright notice in all copies.
 */

let scene, camera, renderer, knot, particles;
let mouseX = 0, mouseY = 0;
let targetRotX = 0, targetRotY = 0;

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000000, 0.035);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 14);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // Lighting
  const ambient = new THREE.AmbientLight(0x404060, 1.2);
  scene.add(ambient);

  const light1 = new THREE.PointLight(0x66ccff, 2.5, 50);
  light1.position.set(8, 8, 8);
  scene.add(light1);

  const light2 = new THREE.PointLight(0xff66aa, 2, 50);
  light2.position.set(-8, -6, 6);
  scene.add(light2);

  // Central torus knot
  const geometry = new THREE.TorusKnotGeometry(3, 0.9, 200, 32);
  const material = new THREE.MeshStandardMaterial({
    color: 0x4fd1ff,
    metalness: 0.75,
    roughness: 0.2,
    emissive: 0x0a2a3a,
    emissiveIntensity: 0.4
  });
  knot = new THREE.Mesh(geometry, material);
  scene.add(knot);

  const wireGeometry = new THREE.TorusKnotGeometry(3.05, 0.92, 100, 16);
  const wireMaterial = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    wireframe: true,
    transparent: true,
    opacity: 0.06
  });
  const wireKnot = new THREE.Mesh(wireGeometry, wireMaterial);
  knot.add(wireKnot);

  // Particle field
  const particleCount = 1500;
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    const radius = 20 + Math.random() * 30;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);
    positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = radius * Math.cos(phi);
  }
  const particleGeometry = new THREE.BufferGeometry();
  particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMaterial = new THREE.PointsMaterial({
    color: 0x88ccff,
    size: 0.12,
    transparent: true,
    opacity: 0.6,
    sizeAttenuation: true
  });
  particles = new THREE.Points(particleGeometry, particleMaterial);
  scene.add(particles);

  // Interaction
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('touchmove', onTouchMove, { passive: true });
  document.addEventListener('wheel', onWheel, { passive: true });
  window.addEventListener('resize', onResize);
}

function onMouseMove(e) {
  mouseX = (e.clientX / window.innerWidth) * 2 - 1;
  mouseY = (e.clientY / window.innerHeight) * 2 - 1;
  targetRotY = mouseX * Math.PI * 0.3;
  targetRotX = mouseY * Math.PI * 0.2;
}

function onTouchMove(e) {
  if (e.touches.length > 0) {
    const t = e.touches[0];
    mouseX = (t.clientX / window.innerWidth) * 2 - 1;
    mouseY = (t.clientY / window.innerHeight) * 2 - 1;
    targetRotY = mouseX * Math.PI * 0.3;
    targetRotX = mouseY * Math.PI * 0.2;
  }
}

function onWheel(e) {
  camera.position.z += e.deltaY * 0.01;
  camera.position.z = Math.max(6, Math.min(30, camera.position.z));
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  const t = performance.now() * 0.0005;

  knot.rotation.x += 0.003;
  knot.rotation.y += 0.004;

  knot.rotation.x += (targetRotX - knot.rotation.x) * 0.02;
  knot.rotation.z += (targetRotY - knot.rotation.z) * 0.02;

  particles.rotation.y = t * 0.15;
  particles.rotation.x = t * 0.05;

  const scale = 1 + Math.sin(t * 2) * 0.03;
  knot.scale.set(scale, scale, scale);

  renderer.render(scene, camera);
}
</script>
</body>
</html>
